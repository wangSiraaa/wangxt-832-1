version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kitchen_production
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/kitchen_production?schema=public
      API_PORT: 3000
      NODE_ENV: production
    ports:
      - "${API_PORT}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./frontend
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:${API_PORT}/api
    restart: on-failure

volumes:
  postgres_data:
